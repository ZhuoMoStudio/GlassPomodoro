name: Build GlassPomodoro

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'

permissions:
  contents: write        # 允许创建 Release 和上传附件
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ===== Release 签名配置 =====
      # 你需要先在 GitHub 仓库设置中添加以下 Secrets：
      #   仓库 → Settings → Secrets and variables → Actions → New repository secret
      #
      # 1. KEYSTORE_FILE: 你的 .jks 密钥库文件（base64 编码）
      #    命令: base64 -w0 your-keystore.jks | pbcopy  (Mac)
      #          certutil -encode your-keystore.jks | findstr /v "-----"   (Win)
      #
      # 2. KEYSTORE_PASSWORD: 密钥库密码
      # 3. KEY_ALIAS: 密钥别名（如 my-key）
      # 4. KEY_PASSWORD: 密钥密码
      #
      # 未设置这些 Secrets 时，Release APK 会使用 debug 签名（安装正常但不可分发）
      - name: Decode keystore from secrets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE }}
        run: |
          if [ -n "$KEYSTORE_FILE_B64" ]; then
            echo "$KEYSTORE_FILE_B64" | base64 -d > $HOME/keystore.jks 2>/dev/null
            if [ -s "$HOME/keystore.jks" ]; then
              echo "KEYSTORE_PATH=$HOME/keystore.jks" >> $GITHUB_ENV
              echo "✅ 密钥库已从 Secrets 安全加载 ($(wc -c < $HOME/keystore.jks) bytes)"
            else
              echo "⚠️ base64 解码失败，跳过签名"
            fi
          else
            echo "ℹ️ KEYSTORE_FILE Secret 未设置，使用 debug 签名构建"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GlassPomodoro-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: GlassPomodoro-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
