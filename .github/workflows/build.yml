name: Build GlassPomodoro

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ===== Release 签名：从 GitHub Secrets 安全加载 =====
      # 使用方法：
      # 1. 将 .jks 文件 base64 编码后存入 Secrets.KEYSTORE_FILE
      #    base64 -w0 your-keystore.jks
      # 2. 在 GitHub 仓库 → Settings → Secrets and variables → Actions 添加：
      #    - KEYSTORE_FILE: base64 编码的密钥库
      #    - KEYSTORE_PASSWORD: 密钥库密码
      #    - KEY_ALIAS: 密钥别名
      #    - KEY_PASSWORD: 密钥密码
      # ⚠️ 以上所有 Secrets 仅 Actions 运行时可见，不会泄露到日志或代码中
      - name: Decode keystore from secrets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE }}
        run: |
          if [ -n "$KEYSTORE_FILE_B64" ]; then
            echo "$KEYSTORE_FILE_B64" | base64 -d > $HOME/keystore.jks
            echo "KEYSTORE_PATH=$HOME/keystore.jks" >> $GITHUB_ENV
            echo "✅ 密钥库已从 Secrets 安全加载"
          else
            echo "⚠️ 未设置 KEYSTORE_FILE Secret，跳过签名"
            # 设置空值以便 Gradle 判断跳过签名
            echo "KEYSTORE_PATH=" >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GlassPomodoro-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Build Release APK (signed with secrets)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: GlassPomodoro-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
