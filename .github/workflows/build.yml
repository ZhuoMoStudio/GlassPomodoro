name: Build GlassPomodoro

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ===== Release 签名配置 =====
      - name: Decode keystore from secrets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE }}
        run: |
          if [ -n "$KEYSTORE_FILE_B64" ]; then
            echo "$KEYSTORE_FILE_B64" | base64 -d > $HOME/keystore.jks 2>/dev/null
            if [ -s "$HOME/keystore.jks" ]; then
              echo "KEYSTORE_PATH=$HOME/keystore.jks" >> $GITHUB_ENV
              echo "✅ 密钥库已从 Secrets 安全加载 ($(wc -c < $HOME/keystore.jks) bytes)"
            else
              echo "⚠️ base64 解码失败"
            fi
          else
            echo "ℹ️ 使用 debug 签名"
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK for end users
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp "app/build/outputs/apk/release/app-release.apk" "GlassPomodoro-${VERSION}.apk"
          elif [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp "app/build/outputs/apk/release/app-release-unsigned.apk" "GlassPomodoro-${VERSION}.apk"
          fi
          ls -la GlassPomodoro-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: GlassPomodoro-*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
